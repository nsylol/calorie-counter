name: CI/CD Pipeline
on:
  push:
    branches: [ main, master ]
jobs:
  build-and-deploy:
    runs-on: [self-hosted, Linux, X64]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/calorie-counter:latest .
      
      - name: Push Docker image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/calorie-counter:latest
      
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            docker stop calorie-counter-app || true
            docker rm calorie-counter-app || true
            docker pull ${{ secrets.DOCKER_USERNAME }}/calorie-counter:latest
            docker run -d --name calorie-counter-app -p 80:80 \
              --restart unless-stopped \
              ${{ secrets.DOCKER_USERNAME }}/calorie-counter:latest
            docker ps
      
      - name: Deployment info
        run: |
          echo "SUCCESS: Deployed to http://${{ secrets.SERVER_HOST }}"